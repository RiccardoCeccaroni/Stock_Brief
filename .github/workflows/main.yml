name: Keep Streamlit Apps Alive

on:
  schedule:
    - cron: '18 */3 * * *'
  workflow_dispatch:

jobs:
  wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Wake up Streamlit apps
        run: |
          python3 << 'EOF'
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.common.by import By
          from webdriver_manager.chrome import ChromeDriverManager
          import time

          urls = [
              "https://stockbrief.streamlit.app/",
              "https://italian-re-dashboard.streamlit.app/"
          ]

          options = Options()
          options.add_argument("--headless=new")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          service = Service(ChromeDriverManager().install())
          driver = webdriver.Chrome(service=service, options=options)

          for url in urls:
              print(f"Visiting {url}")
              driver.get(url)
              time.sleep(5)
              try:
                  buttons = driver.find_elements(By.TAG_NAME, "button")
                  for btn in buttons:
                      text = btn.text.strip().lower()
                      if "wake" in text or "get this app" in text or "yes" in text:
                          print(f"  Clicking: {btn.text}")
                          btn.click()
                          time.sleep(15)
                          break
                  else:
                      print(f"  App appears to be running already")
              except Exception as e:
                  print(f"  Error: {e}")

          driver.quit()
          print("Done")
          EOF
